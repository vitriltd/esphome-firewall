esphome:
  name: firewall-test-runtime
  friendly_name: Firewall Runtime Test

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ../components

firewall:
  trusted:
    - 10.0.0.0/24
    - fd00::/48
  block_icmp: true
  log_dropped: true
  allow_runtime_changes: true
  runtime_slots: 4
  runtime_ttl: 30min
