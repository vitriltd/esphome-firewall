esphome:
  name: my-device
  friendly_name: My Device

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

external_components:
  - source: github://vitriltd/esphome-firewall
    components: [firewall]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Expose the web panel -- the firewall controls who can reach it.
web_server:
  port: 80

# Only allow inbound TCP from your home LAN and WireGuard subnet.
# Everything else (port scans, untrusted devices) is silently dropped.
firewall:
  trusted:
    - 192.168.1.0/24     # home LAN
    - 10.0.0.0/24        # WireGuard subnet
  log_dropped: true      # log drops at DEBUG level (rate-limited to 1 line / 5s)

sensor:
  - platform: uptime
    name: Uptime
